<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Studio 4.0</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div class="intro-logo">NIKA CINEMA EXPERIENCE</div>
</div>

<!-- NAV -->
<nav class="navbar" id="navbar">
    <div class="logo">🎬 BADO SOUND</div>
</nav>

<!-- HERO (SCENE 1) -->
<section class="scene">
    <div class="hero">
        <h1>BADO ELVIS NICAISE</h1>
        <p>Sound Designer | Post Production Cinema</p>
    </div>
</section>

<!-- SCENE 2 -->
<section class="scene">
    <h2>Projets</h2>
    <div class="cards">
        <div class="card">Soweto</div>
        <div class="card">Doc</div>
        <div class="card">Fiction</div>
    </div>
</section>

<!-- SCENE 3 REEL -->
<section class="scene">
    <h2>Sound Reel</h2>

    <audio id="audio" src="reel.mp3"></audio>
    <button id="playBtn">Play</button>

    <canvas id="waveform"></canvas>
</section>

<!-- SCENE 4 -->
<section class="scene">
    <h2>Filmography</h2>

    <div class="project-card">Soweto</div>
    <div class="project-card">Documentaire</div>
</section>

<script>

/* =========================
   INTRO
========================= */
window.addEventListener("load", () => {
    const intro = document.getElementById("intro");
    setTimeout(() => intro.remove(), 1800);
});

/* =========================
   CAMERA SCROLL (FOCUS SYSTEM)
========================= */
const scenes = document.querySelectorAll(".scene");

const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if(e.isIntersecting){
            e.target.classList.add("active");
        } else {
            e.target.classList.remove("active");
        }
    });
}, { threshold: 0.4 });

scenes.forEach(s => observer.observe(s));

/* =========================
   AUDIO ENGINE
========================= */
const audio = document.getElementById("audio");
const canvas = document.getElementById("waveform");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resize);
resize();

let audioCtx, analyser, source, dataArray;

function initAudio(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function draw(){
    requestAnimationFrame(draw);
    if(!analyser) return;

    analyser.getByteTimeDomainData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let glow = Math.sin(Date.now()*0.002)*10 + 20;

    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2;
    ctx.shadowBlur = glow;
    ctx.shadowColor = "#38bdf8";

    ctx.beginPath();

    let x = 0;
    let slice = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){
        let y = (dataArray[i]/128) * canvas.height/2;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        x += slice;
    }

    ctx.stroke();
}

/* PLAY */
document.getElementById("playBtn").onclick = () => {
    if(!audioCtx) initAudio();

    if(audio.paused){
        audio.play();
        audioCtx.resume();
        draw();
    } else {
        audio.pause();
    }
};

</script>

</body>
</html>
