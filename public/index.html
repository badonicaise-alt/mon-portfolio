<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Studio Cinema 5.0</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">🎬 NIKA CORPORATION</div>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#showreel">Showreel</a></li>
      <li><a href="#credits">Credits</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero" id="home">
    <h1>TOYIBOULA</h1>
    <p>Production Mixer & Sound Designer</p>
  </section>

  <!-- Projects Section -->
  <section id="projects">
    <h2>Projects</h2>
    <div class="project-card">
      <h3>Soweto</h3>
      <audio controls src="soweto.mp3"></audio>
    </div>
    <div class="project-card">
      <h3>Documentary</h3>
      <audio controls src="doc.mp3"></audio>
    </div>
    <div class="project-card">
      <h3>Fiction</h3>
      <audio controls src="fiction.mp3"></audio>
    </div>
  </section>

  <!-- Showreel Section -->
  <section id="showreel">
    <h2>Sound Reel</h2>
    <audio id="audio" src="reel.mp3"></audio>
    <button id="play">Play / Pause</button>
    <canvas id="waveform"></canvas>
  </section>

  <!-- Marvel-style Credits -->
  <section id="credits">
    <div class="credits-container">
      <div class="scrolling-credits">
        <p>Soweto</p>
        <p>Documentary</p>
        <p>Fiction</p>
        <p>Sound Reel</p>
        <p>Experimental Project</p>
      </div>
    </div>
  </section>

  <!-- JavaScript directly in HTML -->
  <script>
  /* =====================
     Smooth Cursor
  ====================== */
  const cursor = document.querySelector(".cursor");
  document.addEventListener("mousemove", e => {
    cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  /* =====================
     Audio Player
  ====================== */
  const audio = document.getElementById("audio");
  const btn = document.getElementById("play");
  btn.onclick = () => {
    if(audio.paused) audio.play();
    else audio.pause();
  };

  /* =====================
     Waveform Animation
  ====================== */
  const canvas = document.getElementById("waveform");
  const ctx = canvas.getContext("2d");

  function resize(){
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  let t = 0;
  function draw(){
    requestAnimationFrame(draw);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let w = canvas.width;
    let h = canvas.height;
    for(let i=0;i<80;i++){
      let x = i*(w/80);
      let y = Math.sin(i*0.3+t)*30 + Math.cos(i*0.1+t)*20;
      ctx.fillStyle = "#3bbfa6";
      ctx.fillRect(x,h/2,y,2);
    }
    t += 0.03;
  }
  draw();
  </script>

</body>
</html>
