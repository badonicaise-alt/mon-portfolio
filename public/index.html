<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toyiboula - Cinema Sound Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div class="intro-logo">TOYIBOULA</div>
</div>

<!-- NAV -->
<nav class="navbar">
    <div class="logo">🎬 NIKA CORPORATION</div>

    <ul class="nav-links">
        <li><a href="#home">Accueil</a></li>
        <li><a href="#reel">Sound Reel</a></li>
        <li><a href="#projects">Projets</a></li>
    </ul>
</nav>

<!-- HERO -->
<section id="home" class="hero reveal">
    <h1>TOYIBOULA</h1>
    <p>Production Mixer & Sound Designer</p>
</section>

<!-- QUICK CARDS -->
<section class="row reveal">
    <h2>🎬 Projets Cinéma</h2>
    <div class="cards">
        <div class="card">Soweto</div>
        <div class="card">Documentaire</div>
        <div class="card">Fiction</div>
    </div>
</section>

<!-- REEL -->
<section id="reel" class="reel reveal">
    <h2>🎧 Sound Reel</h2>

    <audio id="audio" src="reel.mp3"></audio>
    <button id="playBtn">▶ Play</button>

    <canvas id="waveform"></canvas>
</section>

<!-- PROJECTS -->
<section id="projects" class="projects reveal">
    <h2>🎬 Filmography</h2>

    <div class="project-card">Soweto - Sound Design</div>
    <div class="project-card">Documentaire - Mixage</div>
    <div class="project-card">Fiction - Sound Design</div>
</section>

<!-- SCRIPT INTRO -->
<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
    }, 2000);
});
</script>

<!-- REVEAL -->
<script>
const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if(e.isIntersecting) e.target.classList.add("active");
    });
}, { threshold: 0.15 });

document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
</script>

<!-- AUDIO -->
<script>
const audio = document.getElementById("audio");
const canvas = document.getElementById("waveform");
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let audioCtx, analyser, source, dataArray;

function initAudio(){
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function draw(){
    requestAnimationFrame(draw);

    if(!analyser) return;

    analyser.getByteTimeDomainData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.beginPath();
    ctx.strokeStyle = "#38bdf8";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#38bdf8";

    let x = 0;
    let slice = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){
        let y = (dataArray[i]/128)*canvas.height/2;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        x += slice;
    }

    ctx.stroke();
}

document.getElementById("playBtn").addEventListener("click", () => {
    if(!audioCtx) initAudio();

    if(audio.paused){
        audio.play();
        audioCtx.resume();
        draw();
    } else {
        audio.pause();
    }
});
</script>

</body>
</html>
